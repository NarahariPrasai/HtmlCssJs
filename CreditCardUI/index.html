<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card UI Design</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logoarea">
                <img class="logo" src="logo1.png" alt="">
                <p>Master Card</p>
            </div>

            <div class="simcard">
                <img src="sim.webp" alt="" class="sim">
            </div>
        </div>

        <div class="content">
            <div class="details">
                <div class="leftdiv">
                <p style="font-size: 15px;">Card Number</p>
                <p style="font-size: 20px; font-weight: 400; margin-top: 10px;">8050 5049 2030 3020</p>
                </div>
                <p style="font-size: 19px;">Nischal Prasai</p>
            </div>

            <div class="rightdiv">
                <div class="date">
                <p style="font-size: 15px;">Valid Thru</p>
                <p style="font-size: 18px;">05/28</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
